<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d8a4e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Bin Collection Calendar 2026–27</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 0.3rem;
    color: #1a1a1a;
  }

  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .legend-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }

  .legend-dot.green { background: #2d8a4e; }
  .legend-dot.black { background: #1a1a1a; }

  /* Desktop: grid layout as before */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .month-card {
    background: #fff;
    border-radius: 12px;
    padding: 1.2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .month-title {
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 0.8rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e8e8e8;
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #999;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }

  .day {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border-radius: 8px;
    color: #888;
  }

  .day.current-month {
    color: #333;
  }

  .day.green-bin {
    background: #2d8a4e;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(45,138,78,0.35);
  }

  .day.black-bin {
    background: #1a1a1a;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .day.bank-holiday::after {
    content: '*';
    position: absolute;
    top: 1px;
    right: 4px;
    font-size: 0.7rem;
    color: #ffd700;
    font-weight: 700;
  }

  .day.today {
    outline: 3px solid #e0a000;
    outline-offset: -1px;
  }

  .note {
    text-align: center;
    margin-top: 2rem;
    color: #888;
    font-size: 0.8rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
  }

  .note span { color: #ffd700; font-weight: 700; }

  .next-collection {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    display: inline-block;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .next-collection.green { background: #2d8a4e; color: #fff; }
  .next-collection.black { background: #1a1a1a; color: #fff; }

  .next-wrapper { text-align: center; }

  /* Mobile swipe navigation */
  .month-nav {
    display: none;
  }

  @media (max-width: 600px) {
    .calendar-grid {
      display: flex;
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
    }

    .month-card {
      min-width: 100%;
      flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 400px;
      margin: 0 auto 1rem;
    }

    .month-nav button {
      background: none;
      border: 2px solid #ccc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .month-nav button:active {
      background: #e8e8e8;
    }

    .month-nav button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .month-nav .month-indicator {
      font-weight: 600;
      font-size: 0.85rem;
      color: #666;
    }

    .swipe-hint {
      text-align: center;
      color: #aaa;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }
  }

  @media (min-width: 601px) {
    .swipe-hint { display: none; }
  }
</style>
</head>
<body>

<h1>Bin Collection Calendar</h1>
<p class="subtitle">Wednesday collections &middot; 2026–27</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot green"></div> Green (Waste)</div>
  <div class="legend-item"><div class="legend-dot black"></div> Black (Recycling)</div>
</div>

<div class="next-wrapper" id="next-collection"></div>

<div class="month-nav" id="month-nav">
  <button id="prev-month" aria-label="Previous month">&#8249;</button>
  <span class="month-indicator" id="month-indicator"></span>
  <button id="next-month" aria-label="Next month">&#8250;</button>
</div>
<p class="swipe-hint">Swipe left or right to change month</p>

<div class="calendar-grid" id="calendar"></div>

<p class="note">
  <span>*</span> Bank holiday &mdash; collection may be on a different day of the week.<br>
  Bins out by 6:30am on your property boundary.
</p>

<script>
const greenDates = [
  [2026,2,4],[2026,2,18],
  [2026,3,4],[2026,3,18],
  [2026,4,1],[2026,4,15],[2026,4,29],
  [2026,5,13],[2026,5,28],
  [2026,6,10],[2026,6,24],
  [2026,7,8],[2026,7,22],
  [2026,8,5],[2026,8,19],
  [2026,9,3],[2026,9,16],[2026,9,30],
  [2026,10,14],[2026,10,28],
  [2026,11,11],[2026,11,25],
  [2026,12,9],[2026,12,23],
  [2027,1,8],[2027,1,20],
  [2027,2,3],[2027,2,17],
  [2027,3,3],[2027,3,17],
];

const blackDates = [
  [2026,2,11],[2026,2,25],
  [2026,3,11],[2026,3,25],
  [2026,4,9],[2026,4,22],
  [2026,5,7],[2026,5,20],
  [2026,6,3],[2026,6,17],
  [2026,7,1],[2026,7,15],[2026,7,29],
  [2026,8,12],[2026,8,26],
  [2026,9,9],[2026,9,23],
  [2026,10,7],[2026,10,21],
  [2026,11,4],[2026,11,18],
  [2026,12,2],[2026,12,16],
  [2027,1,2],[2027,1,14],[2027,1,27],
  [2027,2,10],[2027,2,24],
  [2027,3,10],[2027,3,24],
];

const bankHolidays = new Set([
  '2026-4-9','2026-5-7','2026-5-28',
  '2026-9-3',
  '2027-1-2','2027-1-8','2027-1-14',
]);

function toKey(y,m,d) { return `${y}-${m}-${d}`; }

const greenSet = new Set(greenDates.map(([y,m,d]) => toKey(y,m,d)));
const blackSet = new Set(blackDates.map(([y,m,d]) => toKey(y,m,d)));

const months = [
  [2026,2],[2026,3],[2026,4],[2026,5],[2026,6],[2026,7],
  [2026,8],[2026,9],[2026,10],[2026,11],[2026,12],
  [2027,1],[2027,2],[2027,3]
];

const monthNames = ['','January','February','March','April','May','June',
  'July','August','September','October','November','December'];
const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const today = new Date();
const todayKey = toKey(today.getFullYear(), today.getMonth()+1, today.getDate());

const calendarEl = document.getElementById('calendar');
const cards = [];

months.forEach(([year, month], idx) => {
  const card = document.createElement('div');
  card.className = 'month-card';
  card.dataset.index = idx;

  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = `${monthNames[month]} ${year}`;
  card.appendChild(title);

  const headers = document.createElement('div');
  headers.className = 'day-headers';
  dayNames.forEach(d => {
    const h = document.createElement('div');
    h.textContent = d;
    headers.appendChild(h);
  });
  card.appendChild(headers);

  const grid = document.createElement('div');
  grid.className = 'days-grid';

  const firstDay = new Date(year, month - 1, 1);
  let startDay = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month, 0).getDate();

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const key = toKey(year, month, d);
    let cls = 'day current-month';

    if (greenSet.has(key)) cls += ' green-bin';
    else if (blackSet.has(key)) cls += ' black-bin';

    if (bankHolidays.has(key)) cls += ' bank-holiday';
    if (key === todayKey) cls += ' today';

    cell.className = cls;
    cell.textContent = d;
    grid.appendChild(cell);
  }

  card.appendChild(grid);
  calendarEl.appendChild(card);
  cards.push(card);
});

// Next collection banner
const allDates = [
  ...greenDates.map(([y,m,d]) => ({ date: new Date(y, m-1, d), type: 'green', label: 'Green (Waste)' })),
  ...blackDates.map(([y,m,d]) => ({ date: new Date(y, m-1, d), type: 'black', label: 'Black (Recycling)' })),
].sort((a,b) => a.date - b.date);

const now = new Date();
now.setHours(0,0,0,0);
const next = allDates.find(d => d.date >= now);
if (next) {
  const el = document.getElementById('next-collection');
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  const div = document.createElement('div');
  div.className = `next-collection ${next.type}`;
  const daysUntil = Math.round((next.date - now) / 86400000);
  const when = daysUntil === 0 ? 'Today' : daysUntil === 1 ? 'Tomorrow' : `In ${daysUntil} days`;
  div.innerHTML = `Next: ${next.label} &mdash; ${next.date.toLocaleDateString('en-GB', opts)} (${when})`;
  el.appendChild(div);
}

// Mobile swipe navigation
const isMobile = () => window.matchMedia('(max-width: 600px)').matches;

let currentIndex = 0;

// Find the current month's index (or closest future month)
const todayYear = today.getFullYear();
const todayMonth = today.getMonth() + 1;
const currentMonthIdx = months.findIndex(([y, m]) => y === todayYear && m === todayMonth);
if (currentMonthIdx !== -1) {
  currentIndex = currentMonthIdx;
} else {
  // Find the nearest future month
  const nearest = months.findIndex(([y, m]) => y > todayYear || (y === todayYear && m >= todayMonth));
  currentIndex = nearest !== -1 ? nearest : months.length - 1;
}

const indicator = document.getElementById('month-indicator');
const prevBtn = document.getElementById('prev-month');
const nextBtn = document.getElementById('next-month');

let dragging = false;
let dragOffset = 0;

function setTranslate(offset, animate) {
  cards.forEach(c => {
    c.style.transition = animate ? 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1)' : 'none';
    c.style.transform = `translateX(calc(-${currentIndex * 100}% + ${offset}px))`;
  });
}

function showMonth(idx, animate = true) {
  currentIndex = Math.max(0, Math.min(idx, cards.length - 1));
  setTranslate(0, animate);
  const [y, m] = months[currentIndex];
  indicator.textContent = `${monthNames[m]} ${y}`;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === cards.length - 1;
}

prevBtn.addEventListener('click', () => showMonth(currentIndex - 1));
nextBtn.addEventListener('click', () => showMonth(currentIndex + 1));

// Touch swipe handling with live drag
let touchStartX = 0;
let touchStartY = 0;
let directionLocked = false;
let isHorizontal = false;

calendarEl.addEventListener('touchstart', e => {
  if (!isMobile()) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  dragging = true;
  directionLocked = false;
  isHorizontal = false;
  dragOffset = 0;
}, { passive: true });

calendarEl.addEventListener('touchmove', e => {
  if (!dragging || !isMobile()) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (!directionLocked) {
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      directionLocked = true;
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    }
    return;
  }

  if (!isHorizontal) return;

  // Dampen drag at edges
  if ((currentIndex === 0 && dx > 0) || (currentIndex === cards.length - 1 && dx < 0)) {
    dragOffset = dx * 0.3;
  } else {
    dragOffset = dx;
  }
  setTranslate(dragOffset, false);
}, { passive: true });

calendarEl.addEventListener('touchend', e => {
  if (!dragging || !isMobile()) return;
  dragging = false;

  if (!isHorizontal) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  // Swipe if dragged > 25% of screen width or with enough velocity
  if (Math.abs(dx) > window.innerWidth * 0.25) {
    if (dx < 0) showMonth(currentIndex + 1);
    else showMonth(currentIndex - 1);
  } else {
    showMonth(currentIndex); // snap back
  }
  dragOffset = 0;
}, { passive: true });

// Initialize mobile view
if (isMobile()) showMonth(currentIndex, false);

window.addEventListener('resize', () => {
  if (isMobile()) {
    showMonth(currentIndex, false);
  } else {
    cards.forEach(c => {
      c.style.transition = '';
      c.style.transform = '';
    });
  }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
