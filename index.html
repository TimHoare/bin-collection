<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d8a4e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Bin Collection Calendar 2026–27</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 0.3rem;
    color: #1a1a1a;
  }

  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .legend-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }

  .legend-dot.green { background: #2d8a4e; }
  .legend-dot.black { background: #1a1a1a; }

  .calendar-viewport {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Desktop: grid layout */
  .calendar-track {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .month-card {
    background: #fff;
    border-radius: 12px;
    padding: 1.2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .month-title {
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 0.8rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e8e8e8;
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #999;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }

  .day {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border-radius: 8px;
    color: #888;
  }

  .day.current-month { color: #333; }

  .day.green-bin {
    background: #2d8a4e;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(45,138,78,0.35);
  }

  .day.black-bin {
    background: #1a1a1a;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .day.bank-holiday::after {
    content: '*';
    position: absolute;
    top: 1px;
    right: 4px;
    font-size: 0.7rem;
    color: #ffd700;
    font-weight: 700;
  }

  .day.today {
    outline: 3px solid #e0a000;
    outline-offset: -1px;
  }

  .note {
    text-align: center;
    margin-top: 2rem;
    color: #888;
    font-size: 0.8rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
  }

  .note span { color: #ffd700; font-weight: 700; }

  .notify-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .notify-btn {
    background: #fff;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    transition: all 0.2s;
  }

  .notify-btn:hover { border-color: #2d8a4e; color: #2d8a4e; }

  .notify-btn.active {
    background: #2d8a4e;
    border-color: #2d8a4e;
    color: #fff;
  }

  .notify-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .notify-status {
    font-size: 0.75rem;
    color: #888;
  }

  .next-collection {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    display: inline-block;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .next-collection.green { background: #2d8a4e; color: #fff; }
  .next-collection.black { background: #1a1a1a; color: #fff; }

  .next-wrapper { text-align: center; }

  .month-nav { display: none; }
  .swipe-hint { display: none; }

  @media (max-width: 600px) {
    .calendar-viewport {
      overflow: hidden;
    }

    .calendar-track {
      display: flex;
      gap: 0;
      will-change: transform;
    }

    .month-card {
      min-width: 100%;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 400px;
      margin: 0 auto 1rem;
    }

    .month-nav button {
      background: none;
      border: 2px solid #ccc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .month-nav button:active { background: #e8e8e8; }
    .month-nav button:disabled { opacity: 0.3; }

    .month-nav .month-indicator {
      font-weight: 600;
      font-size: 0.85rem;
      color: #666;
    }

    .swipe-hint {
      display: block;
      text-align: center;
      color: #aaa;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }
  }
</style>
</head>
<body>

<h1>Bin Collection Calendar</h1>
<p class="subtitle">Wednesday collections &middot; 2026–27</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot green"></div> Green (Waste)</div>
  <div class="legend-item"><div class="legend-dot black"></div> Black (Recycling)</div>
</div>

<div class="next-wrapper" id="next-collection"></div>

<div class="notify-toggle" id="notify-toggle" style="display:none">
  <button class="notify-btn" id="notify-btn">Enable reminders</button>
  <span class="notify-status" id="notify-status"></span>
</div>

<div class="month-nav" id="month-nav">
  <button id="prev-month" aria-label="Previous month">&#8249;</button>
  <span class="month-indicator" id="month-indicator"></span>
  <button id="next-month" aria-label="Next month">&#8250;</button>
</div>
<p class="swipe-hint">Swipe left or right to change month</p>

<div class="calendar-viewport">
  <div class="calendar-track" id="calendar"></div>
</div>

<p class="note">
  <span>*</span> Bank holiday &mdash; collection may be on a different day of the week.<br>
  Bins out by 6:30am on your property boundary.
</p>

<script>
const greenDates = [
  [2026,2,4],[2026,2,18],
  [2026,3,4],[2026,3,18],
  [2026,4,1],[2026,4,15],[2026,4,29],
  [2026,5,13],[2026,5,28],
  [2026,6,10],[2026,6,24],
  [2026,7,8],[2026,7,22],
  [2026,8,5],[2026,8,19],
  [2026,9,3],[2026,9,16],[2026,9,30],
  [2026,10,14],[2026,10,28],
  [2026,11,11],[2026,11,25],
  [2026,12,9],[2026,12,23],
  [2027,1,8],[2027,1,20],
  [2027,2,3],[2027,2,17],
  [2027,3,3],[2027,3,17],
];

const blackDates = [
  [2026,2,11],[2026,2,25],
  [2026,3,11],[2026,3,25],
  [2026,4,9],[2026,4,22],
  [2026,5,7],[2026,5,20],
  [2026,6,3],[2026,6,17],
  [2026,7,1],[2026,7,15],[2026,7,29],
  [2026,8,12],[2026,8,26],
  [2026,9,9],[2026,9,23],
  [2026,10,7],[2026,10,21],
  [2026,11,4],[2026,11,18],
  [2026,12,2],[2026,12,16],
  [2027,1,2],[2027,1,14],[2027,1,27],
  [2027,2,10],[2027,2,24],
  [2027,3,10],[2027,3,24],
];

const bankHolidays = new Set([
  '2026-4-9','2026-5-7','2026-5-28',
  '2026-9-3',
  '2027-1-2','2027-1-8','2027-1-14',
]);

function toKey(y,m,d) { return `${y}-${m}-${d}`; }

const greenSet = new Set(greenDates.map(([y,m,d]) => toKey(y,m,d)));
const blackSet = new Set(blackDates.map(([y,m,d]) => toKey(y,m,d)));

const months = [
  [2026,2],[2026,3],[2026,4],[2026,5],[2026,6],[2026,7],
  [2026,8],[2026,9],[2026,10],[2026,11],[2026,12],
  [2027,1],[2027,2],[2027,3]
];

const monthNames = ['','January','February','March','April','May','June',
  'July','August','September','October','November','December'];
const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const today = new Date();
const todayKey = toKey(today.getFullYear(), today.getMonth()+1, today.getDate());

const track = document.getElementById('calendar');

months.forEach(([year, month]) => {
  const card = document.createElement('div');
  card.className = 'month-card';

  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = `${monthNames[month]} ${year}`;
  card.appendChild(title);

  const headers = document.createElement('div');
  headers.className = 'day-headers';
  dayNames.forEach(d => {
    const h = document.createElement('div');
    h.textContent = d;
    headers.appendChild(h);
  });
  card.appendChild(headers);

  const grid = document.createElement('div');
  grid.className = 'days-grid';

  const firstDay = new Date(year, month - 1, 1);
  let startDay = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month, 0).getDate();

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const key = toKey(year, month, d);
    let cls = 'day current-month';

    if (greenSet.has(key)) cls += ' green-bin';
    else if (blackSet.has(key)) cls += ' black-bin';

    if (bankHolidays.has(key)) cls += ' bank-holiday';
    if (key === todayKey) cls += ' today';

    cell.className = cls;
    cell.textContent = d;
    grid.appendChild(cell);
  }

  card.appendChild(grid);
  track.appendChild(card);
});

// Next collection banner
const allDates = [
  ...greenDates.map(([y,m,d]) => ({ date: new Date(y, m-1, d), type: 'green', label: 'Green (Waste)' })),
  ...blackDates.map(([y,m,d]) => ({ date: new Date(y, m-1, d), type: 'black', label: 'Black (Recycling)' })),
].sort((a,b) => a.date - b.date);

const now = new Date();
now.setHours(0,0,0,0);
const next = allDates.find(d => d.date >= now);
if (next) {
  const el = document.getElementById('next-collection');
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  const div = document.createElement('div');
  div.className = `next-collection ${next.type}`;
  const daysUntil = Math.round((next.date - now) / 86400000);
  const when = daysUntil === 0 ? 'Today' : daysUntil === 1 ? 'Tomorrow' : `In ${daysUntil} days`;
  div.innerHTML = `Next: ${next.label} &mdash; ${next.date.toLocaleDateString('en-GB', opts)} (${when})`;
  el.appendChild(div);
}

// Mobile swipe navigation
const isMobile = () => window.matchMedia('(max-width: 600px)').matches;

const indicator = document.getElementById('month-indicator');
const prevBtn = document.getElementById('prev-month');
const nextBtn = document.getElementById('next-month');

// Find current month index
const todayYear = today.getFullYear();
const todayMonth = today.getMonth() + 1;
let currentIndex = months.findIndex(([y, m]) => y === todayYear && m === todayMonth);
if (currentIndex === -1) {
  const nearest = months.findIndex(([y, m]) => y > todayYear || (y === todayYear && m >= todayMonth));
  currentIndex = nearest !== -1 ? nearest : months.length - 1;
}

function moveTrack(offsetPx, animate) {
  const vw = track.parentElement.offsetWidth;
  const pos = -currentIndex * vw + offsetPx;
  track.style.transition = animate ? 'transform 0.35s cubic-bezier(0.25, 1, 0.5, 1)' : 'none';
  track.style.transform = `translateX(${pos}px)`;
}

function showMonth(idx, animate) {
  currentIndex = Math.max(0, Math.min(idx, months.length - 1));
  moveTrack(0, animate !== false);
  const [y, m] = months[currentIndex];
  indicator.textContent = `${monthNames[m]} ${y}`;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === months.length - 1;
}

prevBtn.addEventListener('click', () => showMonth(currentIndex - 1));
nextBtn.addEventListener('click', () => showMonth(currentIndex + 1));

// Touch handling
let touchStartX = 0;
let touchStartY = 0;
let dragging = false;
let dirLocked = false;
let isHoriz = false;

track.addEventListener('touchstart', e => {
  if (!isMobile()) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  dragging = true;
  dirLocked = false;
  isHoriz = false;
  // Kill any in-progress animation so drag feels instant
  track.style.transition = 'none';
}, { passive: true });

track.addEventListener('touchmove', e => {
  if (!dragging || !isMobile()) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (!dirLocked) {
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      dirLocked = true;
      isHoriz = Math.abs(dx) > Math.abs(dy);
    }
    return;
  }
  if (!isHoriz) return;

  e.preventDefault();

  // Rubber-band at edges
  let offset = dx;
  if ((currentIndex === 0 && dx > 0) || (currentIndex === months.length - 1 && dx < 0)) {
    offset = dx * 0.25;
  }
  moveTrack(offset, false);
}, { passive: false });

track.addEventListener('touchend', e => {
  if (!dragging || !isMobile()) { dragging = false; return; }
  dragging = false;
  if (!isHoriz) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const threshold = track.parentElement.offsetWidth * 0.25;

  if (dx < -threshold && currentIndex < months.length - 1) {
    showMonth(currentIndex + 1);
  } else if (dx > threshold && currentIndex > 0) {
    showMonth(currentIndex - 1);
  } else {
    moveTrack(0, true); // snap back
  }
}, { passive: true });

// Init
if (isMobile()) showMonth(currentIndex, false);

window.addEventListener('resize', () => {
  if (isMobile()) {
    showMonth(currentIndex, false);
  } else {
    track.style.transition = '';
    track.style.transform = '';
  }
});
</script>
<script>
const WORKER_URL = 'https://bin-collection-push.timbo-hoare.workers.dev';
const VAPID_PUBLIC_KEY = 'BPK7tkq2TNezvOTnhvBl3YSerg4hjG03EZ_lGWmrvQ9MFv0o4mTk4ZGAY_mVL1I5hve4ZNoMsXoO4vhlNTJuiKk';

(async function initNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

  const registration = await navigator.serviceWorker.register('sw.js');
  await navigator.serviceWorker.ready;

  const toggle = document.getElementById('notify-toggle');
  const btn = document.getElementById('notify-btn');
  const status = document.getElementById('notify-status');
  toggle.style.display = 'flex';

  // Check existing subscription
  const existing = await registration.pushManager.getSubscription();
  if (existing) {
    btn.textContent = 'Disable reminders';
    btn.classList.add('active');
    status.textContent = 'You\u2019ll get a reminder at 7pm the evening before';
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    try {
      const current = await registration.pushManager.getSubscription();

      if (current) {
        // Unsubscribe
        await fetch(`${WORKER_URL}/unsubscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: current.endpoint }),
        });
        await current.unsubscribe();
        btn.textContent = 'Enable reminders';
        btn.classList.remove('active');
        status.textContent = '';
      } else {
        // Subscribe
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          status.textContent = 'Notifications blocked — check browser settings';
          btn.disabled = false;
          return;
        }

        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: VAPID_PUBLIC_KEY,
        });

        await fetch(`${WORKER_URL}/subscribe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription.toJSON()),
        });

        btn.textContent = 'Disable reminders';
        btn.classList.add('active');
        status.textContent = 'You\u2019ll get a reminder at 7pm the evening before';
      }
    } catch (err) {
      console.error('Notification setup failed:', err);
      status.textContent = 'Something went wrong — try again';
    }
    btn.disabled = false;
  });
})();
</script>
</body>
</html>
